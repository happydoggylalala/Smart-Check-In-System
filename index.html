<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>智慧報到系統</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="topbar">
  <h1>智慧報到系統</h1>
  <nav class="tabs">
    <button data-target="screen-checkin" class="tab-btn active">報到</button>
    <button data-target="screen-dashboard" class="tab-btn">儀表板</button>
    <button data-target="screen-grouping" class="tab-btn">分組座位</button>
    <button data-target="screen-lottery" class="tab-btn">抽獎</button>
    <button data-target="screen-import" class="tab-btn">名單匯入</button>
    <button data-target="screen-settings" class="tab-btn">設定</button>
  </nav>
</header>

<main>

  <!-- ============ 報到 ============ -->
  <section id="screen-checkin" class="screen active">
    <h2>報到</h2>
    <div class="panel">
      <input id="checkin-search" type="text" placeholder="輸入姓名或工號搜尋..." autocomplete="off">
      <div id="checkin-results" class="result-list"></div>
    </div>

    <div class="panel">
      <button id="btn-open-walkin" class="btn-secondary">找不到？現場報到</button>
      <div id="walkin-form" class="walkin-form hidden">
        <input id="walkin-name" type="text" placeholder="姓名 *">
        <input id="walkin-employeeid" type="text" placeholder="工號">
        <input id="walkin-email" type="email" placeholder="Email">
        <div class="form-actions">
          <button id="btn-walkin-submit" class="btn-primary">送出現場報到</button>
          <button id="btn-walkin-cancel" class="btn-ghost">取消</button>
        </div>
      </div>
    </div>

    <div id="checkin-confirm" class="confirm-panel hidden"></div>
  </section>

  <!-- ============ 儀表板 ============ -->
  <section id="screen-dashboard" class="screen">
    <h2>儀表板</h2>
    <div id="stat-tiles" class="stat-tiles"></div>
    <div class="panel">
      <div class="dashboard-toolbar">
        <input id="dashboard-search" type="text" placeholder="搜尋姓名/工號/Email...">
        <select id="dashboard-filter-status">
          <option value="">全部狀態</option>
          <option value="pending">尚未報到</option>
          <option value="on_time">準時</option>
          <option value="late">遲到</option>
          <option value="absent">未到</option>
        </select>
        <button id="btn-export-csv" class="btn-secondary">匯出 CSV</button>
        <button id="btn-export-xlsx" class="btn-secondary">匯出 Excel</button>
      </div>
      <div class="table-wrap">
        <table id="dashboard-table">
          <thead>
            <tr>
              <th>狀態</th><th>姓名</th><th>工號</th><th>Email</th><th>早鳥</th>
              <th>候補</th><th>組別座位</th><th>報到時間</th><th>簽退</th><th>Email狀態</th><th>抽獎</th>
            </tr>
          </thead>
          <tbody id="dashboard-tbody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- ============ 分組座位 ============ -->
  <section id="screen-grouping" class="screen">
    <h2>分組座位板</h2>
    <div id="grouping-board" class="grouping-board"></div>
  </section>

  <!-- ============ 抽獎 ============ -->
  <section id="screen-lottery" class="screen">
    <h2>現場抽獎</h2>
    <div class="panel lottery-panel">
      <p>目前可抽獎人數：<span id="lottery-pool-count">0</span> 人</p>
      <label><input type="checkbox" id="lottery-exclude-winners" checked> 排除已得獎者</label>
      <div class="form-actions">
        <button id="btn-draw" class="btn-primary btn-big">🎉 抽獎</button>
        <button id="btn-reset-lottery" class="btn-ghost">重置得獎名單</button>
      </div>
    </div>
    <div id="lottery-winner-banner" class="winner-banner hidden"></div>
    <div class="panel">
      <h3>得獎紀錄</h3>
      <ol id="lottery-history"></ol>
    </div>
  </section>

  <!-- ============ 名單匯入 ============ -->
  <section id="screen-import" class="screen">
    <h2>名單匯入</h2>
    <div class="panel">
      <input id="import-file" type="file" accept=".csv,.xlsx,.xls">
      <p class="hint">支援 CSV / Excel，欄位建議包含：姓名、工號、Email、報名時間</p>
      <div id="import-preview"></div>
      <button id="btn-import-confirm" class="btn-primary hidden">確認匯入</button>
    </div>
  </section>

  <!-- ============ 設定 ============ -->
  <section id="screen-settings" class="screen">
    <h2>活動設定</h2>
    <div class="panel">
      <h3>活動資訊</h3>
      <label>活動名稱 <input id="set-name" type="text"></label>
      <label>開始時間 <input id="set-start" type="datetime-local"></label>
      <label>結束時間 <input id="set-end" type="datetime-local"></label>
      <label>活動容量（現場候補用） <input id="set-capacity" type="number" min="0"></label>
    </div>
    <div class="panel">
      <h3>報到規則（分鐘）</h3>
      <label>遲到門檻 <input id="set-late" type="number" min="0"></label>
      <label>報到截止（超過視為未到並阻擋報到） <input id="set-absent" type="number" min="0"></label>
      <label>早退判定窗口（結束前幾分鐘內簽退算早退） <input id="set-earlyleave" type="number" min="0"></label>
    </div>
    <div class="panel">
      <h3>早鳥福利</h3>
      <label>早鳥名額（依報名時間排序前 N 名） <input id="set-earlybird" type="number" min="0"></label>
    </div>
    <div class="panel">
      <h3>智慧分組</h3>
      <label>組數 <input id="set-groupcount" type="number" min="1"></label>
      <label>每組人數（規劃值，供超額提示用） <input id="set-groupsize" type="number" min="1"></label>
    </div>
    <div class="panel">
      <h3>EmailJS 講義寄送</h3>
      <label><input type="checkbox" id="set-email-enabled"> 啟用報到後自動寄送講義 Email</label>
      <label>Service ID <input id="set-email-service" type="text"></label>
      <label>Template ID <input id="set-email-template" type="text"></label>
      <label>Public Key <input id="set-email-publickey" type="text"></label>
      <label>講義連結 <input id="set-email-link" type="text"></label>
      <div class="form-actions">
        <button id="btn-email-test" class="btn-secondary">測試寄送給自己</button>
        <input id="set-email-testaddr" type="email" placeholder="測試收件 Email">
      </div>
    </div>
    <div class="panel">
      <button id="btn-save-settings" class="btn-primary">儲存設定</button>
      <span id="settings-saved-hint" class="hint hidden">已儲存</span>
    </div>
    <div class="panel">
      <h3>資料備份</h3>
      <button id="btn-backup-export" class="btn-secondary">匯出備份 (JSON)</button>
      <input id="btn-backup-import" type="file" accept=".json">
    </div>
    <div class="panel danger-zone">
      <h3>危險操作</h3>
      <button id="btn-clear-all" class="btn-danger">清除所有資料</button>
    </div>
  </section>

</main>

<div id="toast-container" class="toast-container"></div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
